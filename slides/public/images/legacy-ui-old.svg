<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffff00"/>
      <stop offset="50%" style="stop-color:#ffaa00"/>
      <stop offset="51%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
  </defs>
  
  <!-- Window Background -->
  <rect x="0" y="0" width="800" height="450" fill="#f0f0f0"/>
  
  <!-- Main Window -->
  <rect x="50" y="30" width="700" height="380" fill="#f0f0f0" stroke="#808080" stroke-width="2"/>
  <rect x="50" y="30" width="700" height="380" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="2,2" opacity="0.3"/>
  
  <!-- Window Header -->
  <rect x="51" y="31" width="698" height="24" fill="url(#headerGrad)"/>
  <text x="60" y="48" font-family="SimSun, serif" font-size="11" font-weight="bold" fill="#000">经典管理系统 v1.0</text>
  
  <!-- Window Control Buttons -->
  <rect x="700" y="34" width="14" height="12" fill="#ddd" stroke="#fff" stroke-width="1"/>
  <text x="705" y="44" font-size="8" fill="#000">−</text>
  <rect x="718" y="34" width="14" height="12" fill="#ddd" stroke="#fff" stroke-width="1"/>
  <text x="723" y="44" font-size="8" fill="#000">◻</text>
  <rect x="736" y="34" width="14" height="12" fill="#ff4444" stroke="#fff" stroke-width="1"/>
  <text x="741" y="45" font-size="10" font-weight="bold" fill="#fff">×</text>
  
  <!-- Menu Bar -->
  <rect x="51" y="55" width="698" height="20" fill="#f0f0f0"/>
  <text x="60" y="69" font-family="SimSun" font-size="11" fill="#000">文件</text>
  <text x="100" y="69" font-family="SimSun" font-size="11" fill="#000">编辑</text>
  <text x="140" y="69" font-family="SimSun" font-size="11" fill="#000">视图</text>
  <text x="180" y="69" font-family="SimSun" font-size="11" fill="#000">工具</text>
  <text x="220" y="69" font-family="SimSun" font-size="11" fill="#000">帮助</text>
  
  <!-- Toolbar -->
  <rect x="51" y="76" width="698" height="28" fill="#f0f0f0"/>
  <rect x="60" y="80" width="20" height="20" fill="#e0e0e0" stroke="#ccc"/>
  <rect x="85" y="80" width="20" height="20" fill="#e0e0e0" stroke="#ccc"/>
  <rect x="110" y="80" width="20" height="20" fill="#e0e0e0" stroke="#ccc"/>
  <line x1="140" y1="78" x2="140" y2="102" stroke="#ccc"/>
  <rect x="150" y="80" width="20" height="20" fill="#e0e0e0" stroke="#ccc"/>
  <rect x="175" y="80" width="20" height="20" fill="#e0e0e0" stroke="#ccc"/>
  
  <!-- Tab Headers -->
  <rect x="51" y="105" width="698" height="26" fill="#f0f0f0"/>
  <rect x="60" y="105" width="80" height="24" fill="#fff" stroke="#808080" stroke-width="2"/>
  <text x="100" y="121" font-family="SimSun" font-size="11" text-anchor="middle" fill="#000">数据视图</text>
  <rect x="142" y="105" width="80" height="24" fill="#e0e0e0" stroke="#ccc"/>
  <text x="182" y="121" font-family="SimSun" font-size="11" text-anchor="middle" fill="#333">详细信息</text>
  <rect x="224" y="105" width="80" height="24" fill="#e0e0e0" stroke="#ccc"/>
  <text x="264" y="121" font-family="SimSun" font-size="11" text-anchor="middle" fill="#333">系统设置</text>
  
  <!-- Content Area -->
  <rect x="51" y="132" width="698" height="240" fill="#fff"/>
  <rect x="51" y="132" width="698" height="240" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  
  <!-- Input Section -->
  <rect x="70" y="150" width="200" height="22" fill="#fff" stroke="#ccc" stroke-width="2"/>
  <text x="80" y="165" font-family="SimSun" font-size="11" fill="#999">请输入搜索关键词...</text>
  <rect x="280" y="150" width="60" height="24" fill="url(#headerGrad)" stroke="#ffaa00" stroke-width="2"/>
  <text x="310" y="166" font-family="SimSun" font-size="11" font-weight="bold" text-anchor="middle" fill="#000">搜索</text>
  
  <!-- Data Grid Header -->
  <rect x="70" y="190" width="660" height="24" fill="#f5f5f5" stroke="#ccc"/>
  <line x1="180" y1="190" x2="180" y2="214" stroke="#ccc"/>
  <line x1="400" y1="190" x2="400" y2="214" stroke="#ccc"/>
  <line x1="550" y1="190" x2="550" y2="214" stroke="#ccc"/>
  <text x="125" y="206" font-family="SimSun" font-size="11" fill="#333">项目名称</text>
  <text x="290" y="206" font-family="SimSun" font-size="11" fill="#333">状态</text>
  <text x="475" y="206" font-family="SimSun" font-size="11" fill="#333">进度</text>
  <text x="600" y="206" font-family="SimSun" font-size="11" fill="#333">操作</text>
  
  <!-- Data Grid Rows -->
  <rect x="70" y="214" width="660" height="30" fill="#fff" stroke="#ddd"/>
  <rect x="70" y="244" width="660" height="30" fill="#f9f9f9" stroke="#ddd"/>
  <rect x="70" y="274" width="660" height="30" fill="#fff" stroke="#ddd"/>
  <rect x="70" y="304" width="660" height="30" fill="#f9f9f9" stroke="#ddd"/>
  
  <line x1="180" y1="214" x2="180" y2="334" stroke="#ddd"/>
  <line x1="400" y1="214" x2="400" y2="334" stroke="#ddd"/>
  <line x1="550" y1="214" x2="550" y2="334" stroke="#ddd"/>
  
  <text x="125" y="233" font-family="SimSun" font-size="11" fill="#333">项目 Alpha</text>
  <text x="125" y="263" font-family="SimSun" font-size="11" fill="#333">项目 Beta</text>
  <text x="125" y="293" font-family="SimSun" font-size="11" fill="#333">项目 Gamma</text>
  <text x="125" y="323" font-family="SimSun" font-size="11" fill="#333">项目 Delta</text>
  
  <!-- Status Badges -->
  <rect x="200" y="219" width="50" height="18" fill="#dbeafe" rx="9"/>
  <text x="225" y="232" font-family="SimSun" font-size="9" text-anchor="middle" fill="#1e40af">进行中</text>
  <rect x="200" y="249" width="50" height="18" fill="#d1fae5" rx="9"/>
  <text x="225" y="262" font-family="SimSun" font-size="9" text-anchor="middle" fill="#065f46">已完成</text>
  <rect x="200" y="279" width="50" height="18" fill="#fef3c7" rx="9"/>
  <text x="225" y="292" font-family="SimSun" font-size="9" text-anchor="middle" fill="#92400e">规划中</text>
  <rect x="200" y="309" width="50" height="18" fill="#dbeafe" rx="9"/>
  <text x="225" y="322" font-family="SimSun" font-size="9" text-anchor="middle" fill="#1e40af">进行中</text>
  
  <!-- Progress Bars -->
  <rect x="420" y="224" width="100" height="10" fill="#e5e7eb" rx="2"/>
  <rect x="420" y="224" width="75" height="10" fill="#ffff00" rx="2"/>
  <rect x="420" y="254" width="100" height="10" fill="#e5e7eb" rx="2"/>
  <rect x="420" y="254" width="100" height="10" fill="#10b981" rx="2"/>
  <rect x="420" y="284" width="100" height="10" fill="#e5e7eb" rx="2"/>
  <rect x="420" y="284" width="20" height="10" fill="#f59e0b" rx="2"/>
  <rect x="420" y="314" width="100" height="10" fill="#e5e7eb" rx="2"/>
  <rect x="420" y="314" width="60" height="10" fill="#ffff00" rx="2"/>
  
  <!-- Buttons in Grid -->
  <rect x="570" y="219" width="45" height="18" fill="#e0e0e0" stroke="#fff" stroke-width="1"/>
  <text x="592" y="232" font-family="SimSun" font-size="9" text-anchor="middle" fill="#333">编辑</text>
  <rect x="625" y="219" width="45" height="18" fill="#e0e0e0" stroke="#fff" stroke-width="1"/>
  <text x="647" y="232" font-family="SimSun" font-size="9" text-anchor="middle" fill="#333">删除</text>
  
  <rect x="570" y="249" width="45" height="18" fill="#e0e0e0" stroke="#fff" stroke-width="1"/>
  <text x="592" y="262" font-family="SimSun" font-size="9" text-anchor="middle" fill="#333">编辑</text>
  <rect x="625" y="249" width="45" height="18" fill="#e0e0e0" stroke="#fff" stroke-width="1"/>
  <text x="647" y="262" font-family="SimSun" font-size="9" text-anchor="middle" fill="#333">删除</text>
  
  <rect x="570" y="279" width="45" height="18" fill="#e0e0e0" stroke="#fff" stroke-width="1"/>
  <text x="592" y="292" font-family="SimSun" font-size="9" text-anchor="middle" fill="#333">编辑</text>
  <rect x="625" y="279" width="45" height="18" fill="#e0e0e0" stroke="#fff" stroke-width="1"/>
  <text x="647" y="292" font-family="SimSun" font-size="9" text-anchor="middle" fill="#333">删除</text>
  
  <rect x="570" y="309" width="45" height="18" fill="#e0e0e0" stroke="#fff" stroke-width="1"/>
  <text x="592" y="322" font-family="SimSun" font-size="9" text-anchor="middle" fill="#333">编辑</text>
  <rect x="625" y="309" width="45" height="18" fill="#e0e0e0" stroke="#fff" stroke-width="1"/>
  <text x="647" y="322" font-family="SimSun" font-size="9" text-anchor="middle" fill="#333">删除</text>
  
  <!-- Status Bar -->
  <rect x="51" y="372" width="698" height="18" fill="#f0f0f0"/>
  <text x="60" y="385" font-family="SimSun" font-size="10" fill="#666">就绪</text>
  <text x="680" y="385" font-family="SimSun" font-size="10" text-anchor="right" fill="#666">共 4 个项目</text>
  
  <!-- Label -->
  <text x="400" y="430" font-family="Arial" font-size="14" text-anchor="middle" fill="#92400e" font-weight="bold">
    重构前 - Legacy 旧界面
  </text>
</svg>
