<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经典管理系统 - Legacy 演示</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="window">
    <div class="window-header">
      <span class="window-title">经典管理系统 v1.0</span>
      <div class="window-controls">
        <button class="btn-minimize" title="最小化">−</button>
        <button class="btn-maximize" title="最大化">◻</button>
        <button class="btn-close" title="关闭">×</button>
      </div>
    </div>
    
    <div class="menu-bar">
      <span class="menu-item">文件 (F)</span>
      <span class="menu-item">编辑 (E)</span>
      <span class="menu-item">视图 (V)</span>
      <span class="menu-item">工具 (T)</span>
      <span class="menu-item">帮助 (H)</span>
    </div>
    
    <div class="toolbar">
      <button class="toolbar-btn" title="新建">📄</button>
      <button class="toolbar-btn" title="打开">📁</button>
      <button class="toolbar-btn" title="保存">💾</button>
      <div class="toolbar-separator"></div>
      <button class="toolbar-btn" title="打印">🖨️</button>
      <button class="toolbar-btn" title="帮助">❓</button>
    </div>
    
    <div class="window-content">
      <div class="tab-container">
        <div class="tab-headers">
          <div class="tab-header active">数据视图</div>
          <div class="tab-header">详细信息</div>
          <div class="tab-header">系统设置</div>
        </div>
        
        <div class="tab-content">
          <div class="search-row">
            <input type="text" class="text-input" placeholder="请输入搜索关键词...">
            <button class="btn-primary">搜索</button>
          </div>
          
          <table class="data-grid">
            <thead>
              <tr>
                <th style="width: 40%;">项目名称</th>
                <th style="width: 20%;">状态</th>
                <th style="width: 25%;">进度</th>
                <th style="width: 15%;">操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>项目 Alpha</td>
                <td><span class="status-badge status-running">进行中</span></td>
                <td>
                  <div class="progress-bar-legacy">
                    <div class="progress-fill" style="width: 75%;"></div>
                  </div>
                </td>
                <td>
                  <button class="btn-secondary btn-small">编辑</button>
                  <button class="btn-secondary btn-small">删除</button>
                </td>
              </tr>
              <tr>
                <td>项目 Beta</td>
                <td><span class="status-badge status-completed">已完成</span></td>
                <td>
                  <div class="progress-bar-legacy">
                    <div class="progress-fill" style="width: 100%;"></div>
                  </div>
                </td>
                <td>
                  <button class="btn-secondary btn-small">编辑</button>
                  <button class="btn-secondary btn-small">删除</button>
                </td>
              </tr>
              <tr>
                <td>项目 Gamma</td>
                <td><span class="status-badge status-planning">规划中</span></td>
                <td>
                  <div class="progress-bar-legacy">
                    <div class="progress-fill" style="width: 20%;"></div>
                  </div>
                </td>
                <td>
                  <button class="btn-secondary btn-small">编辑</button>
                  <button class="btn-secondary btn-small">删除</button>
                </td>
              </tr>
              <tr>
                <td>项目 Delta</td>
                <td><span class="status-badge status-running">进行中</span></td>
                <td>
                  <div class="progress-bar-legacy">
                    <div class="progress-fill" style="width: 60%;"></div>
                  </div>
                </td>
                <td>
                  <button class="btn-secondary btn-small">编辑</button>
                  <button class="btn-secondary btn-small">删除</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    
    <div class="status-bar">
      <span>就绪</span>
      <span>共 4 个项目</span>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
